<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance & Money — bsfreetools.com</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: '#FFD700', darkBg: '#0A0A0A', cardBg: '#1A1A1A', accentGray: '#2A2A2A' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>body { background-color: #0A0A0A; color: #FFFFFF; font-family: 'Inter', sans-serif; }</style>

<body class="antialiased selection:bg-gold selection:text-black">
    <nav class="p-6 flex justify-between items-center max-w-5xl mx-auto">
        <a href="/" class="text-xl font-black text-gold italic hover:opacity-80 transition-opacity">bsfreetools.com</a>

    </nav>

    <header class="pt-12 pb-8 px-6 max-w-5xl mx-auto">

            <span class="text-[9px] uppercase tracking-widest text-gray-700 mb-1">Advertisement</span>

            <a href="/labor" class="flex items-center justify-between p-6 bg-cardBg border border-accentGray rounded-2xl hover:border-gold transition-all group">

                    <span class="text-3xl">💼</span>
                    <div>
                        <h4 class="text-xl font-black group-hover:text-gold transition-colors italic">Labor Index</h4>

                </div>
                <div class="h-10 w-10 rounded-full border border-accentGray flex items-center justify-center group-hover:bg-gold group-hover:text-black transition-all">→</div>

                <span class="text-xs font-bold uppercase tracking-widest">More tools dropping soon ✦</span>
            </div>
        </div>

    <footer class="py-12 text-center border-t border-accentGray/30">
        <p class="text-gray-600 text-[10px] font-bold uppercase tracking-widest italic">© 2026 bsfreetools.com — Simple tools. Zero BS.</p>

</html>
