<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wrap It 🎁 | No BS Gift Wrapping Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0A0A0A',
                        card: '#1A1A1A',
                        gold: '#FFD700',
                        border: '#2A2A2A',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0A0A0A; color: white; -webkit-tap-highlight-color: transparent; }
        .input-box {
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            padding: 1rem;
            width: 100%;
            font-size: 1.25rem;
            color: white;
            transition: all 0.2s;
        }
        .input-box:focus {
            border-color: #FFD700;
            outline: none;
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.2);
        }
        .ad-slot {
            border: 1px dashed #2A2A2A;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 1.5rem 0;
            border-radius: 8px;
        }
        .btn-toggle {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .layout-diagram {
            aspect-ratio: 4/3;
            background: #111;
            border-radius: 12px;
            border: 1px solid #2A2A2A;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body x-data="wrapCalc()">
    <div class="max-w-md mx-auto px-6 py-8 min-h-screen flex flex-col">
        
        <nav class="flex justify-between items-center mb-6">
            <a href="/" class="text-sm font-black text-gold italic hover:opacity-80">
                bsfreetools.com
            </a>
            <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest border border-[#2A2A2A] px-3 py-1 rounded-full">
                100% Private
            </div>
        </nav>

        <div class="text-center mb-6">
            <h1 class="text-2xl font-black tracking-tighter italic">WRAP IT <span class="text-gold">🎁</span></h1>
        </div>

        <div class="bg-card p-1 rounded-xl flex gap-1 mb-4 border border-border">
            <button @click="setMode('quick')" 
                    :class="mode === 'quick' ? 'bg-gold text-black shadow-lg' : 'text-gray-400'"
                    class="btn-toggle">
                🎁 Quick Wrap
            </button>
            <button @click="setMode('fancy')" 
                    :class="mode === 'fancy' ? 'bg-gold text-black shadow-lg' : 'text-gray-400'"
                    class="btn-toggle">
                💰 Fancy Wrap
            </button>
        </div>

        <div class="ad-slot w-full md:h-[90px] h-[50px]">
            <span>Advertisement</span>
        </div>

        <div class="space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-1 ml-1 font-bold">Length</label>
                    <input type="number" x-model="boxL" placeholder="L" class="input-box" inputmode="decimal">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-1 ml-1 font-bold">Width</label>
                    <input type="number" x-model="boxW" placeholder="W" class="input-box" inputmode="decimal">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-1 ml-1 font-bold">Height</label>
                    <input type="number" x-model="boxH" placeholder="H" class="input-box" inputmode="decimal">
                </div>
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-1 ml-1 font-bold">Roll Width (Inches)</label>
                <div class="grid grid-cols-4 gap-2">
                    <template x-for="r in [24, 30, 36]">
                        <button @click="rollW = r; isCustomRoll = false" 
                                :class="rollW == r && !isCustomRoll ? 'border-gold text-gold bg-gold/10' : 'border-border text-gray-400'"
                                class="border py-3 rounded-xl text-sm font-bold" x-text="r"></button>
                    </template>
                    <button @click="isCustomRoll = true" 
                            :class="isCustomRoll ? 'border-gold text-gold bg-gold/10' : 'border-border text-gray-400'"
                            class="border py-3 rounded-xl text-sm font-bold">Custom</button>
                </div>
                <div x-show="isCustomRoll" x-transition class="mt-2">
                    <input type="number" x-model="rollW" placeholder="Enter width" class="input-box" inputmode="decimal">
                </div>
            </div>

            <div x-show="mode === 'fancy'" x-transition class="pt-2">
                <label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2 ml-1 font-bold">Buffer / Overlap</label>
                <div class="grid grid-cols-4 gap-2">
                    <template x-for="b in [0, 1, 2, 3]">
                        <button @click="buffer = b" 
                                :class="buffer == b ? 'border-gold text-gold bg-gold/10' : 'border-border text-gray-400'"
                                class="border py-2 rounded-xl text-sm font-bold" x-text="b + '&quot;'"></button>
                    </template>
                </div>
            </div>
        </div>

        <div class="mt-8 flex-grow">
            <template x-if="canCalculate">
                <div x-transition class="animate-in fade-in zoom-in duration-300">
                    
                    <div x-show="mode === 'quick'" class="text-center">
                        <div class="bg-card border border-border rounded-3xl p-8 mb-4">
                            <span class="block text-gray-500 text-[10px] uppercase tracking-widest mb-2 font-bold">Length to cut</span>
                            <div class="flex items-center justify-center gap-2">
                                <span class="text-8xl font-black text-gold tracking-tighter" x-text="resultLength"></span>
                                <span class="text-2xl font-bold text-gray-600 mt-8">in</span>
                            </div>
                            
                            <div class="mt-6 flex items-center justify-center gap-2 px-4 py-2 rounded-full inline-flex"
                                 :class="isRollWideEnough ? 'text-green-500 bg-green-500/10' : 'text-red-500 bg-red-500/10 font-bold'">
                                <template x-if="isRollWideEnough">
                                    <span class="text-sm">✓ Your roll is wide enough</span>
                                </template>
                                <template x-if="!isRollWideEnough">
                                    <span class="text-sm italic uppercase tracking-tighter tracking-widest">⚠️ Roll too narrow (Needs <span x-text="resultWidth"></span>")</span>
                                </template>
                            </div>
                        </div>
                    </div>

                    <div x-show="mode === 'fancy'" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-card border border-border rounded-2xl p-6 text-center">
                                <span class="block text-gray-500 text-[10px] uppercase tracking-widest mb-1 font-bold">Cut Width</span>
                                <div class="text-4xl font-black text-white"><span x-text="resultWidth"></span><span class="text-sm text-gray-600 ml-1">in</span></div>
                            </div>
                            <div class="bg-card border border-border rounded-2xl p-6 text-center border-gold/30">
                                <span class="block text-gray-500 text-[10px] uppercase tracking-widest mb-1 font-bold">Cut Length</span>
                                <div class="text-4xl font-black text-gold"><span x-text="resultLength"></span><span class="text-sm text-gray-600 ml-1">in</span></div>
                            </div>
                        </div>

                        <div class="layout-diagram flex items-center justify-center p-8">
                            <div class="border-2 border-dashed border-gold/30 w-full h-full relative flex items-center justify-center">
                                <div class="bg-gold text-black font-black p-4 rounded shadow-2xl text-xs z-10">THE BOX</div>
                                <div class="absolute top-2 text-[10px] text-gray-500 font-mono tracking-tighter font-bold">WIDTH: <span x-text="resultWidth"></span>"</div>
                                <div class="absolute left-2 text-[10px] text-gray-500 font-mono -rotate-90 tracking-tighter font-bold">LENGTH: <span x-text="resultLength"></span>"</div>
                            </div>
                        </div>

                        <div class="bg-card/50 p-4 rounded-xl border border-border text-[11px] font-mono text-gray-500 text-center">
                            Math: 2×(H+W)+<span x-text="buffer"></span> | L+2×H+<span x-text="buffer"></span>
                        </div>
                    </div>

                    <button @click="share()" class="w-full bg-white text-black font-black py-4 rounded-2xl mt-4 flex items-center justify-center gap-3 active:scale-[0.98] transition-transform shadow-xl">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                        SHARE RESULT
                    </button>

                    <p class="text-center text-[10px] text-gray-600 mt-6 leading-relaxed px-4">
                        Results assume standard flat wrap technique on a rectangular box. Measure your box carefully — we handle the math, you handle the scissors. bsfreetools.com
                    </p>
                </div>
            </template>
            
            <template x-if="!canCalculate">
                <div class="h-48 border-2 border-dashed border-border rounded-3xl flex items-center justify-center text-gray-700 text-sm italic text-center px-10 leading-relaxed">
                    Enter box dimensions above to see exactly where to cut your paper.
                </div>
            </template>
        </div>

        <footer class="mt-auto pt-12 text-center text-[10px] text-gray-700 font-bold tracking-[0.2em] uppercase">
            Wrap It 🎁 • bsfreetools.com/wrap • Free. No BS.
        </footer>
    </div>

    <script>
        function wrapCalc() {
            return {
                mode: 'quick',
                boxL: '',
                boxW: '',
                boxH: '',
                rollW: 30,
                isCustomRoll: false,
                buffer: 2,

                setMode(m) {
                    this.mode = m;
                    // Reset buffer to default 2 for quick mode, or let user pick in fancy
                    if (m === 'quick') this.buffer = 2;
                },

                get canCalculate() {
                    return this.boxL > 0 && this.boxW > 0 && this.boxH > 0;
                },

                get resultWidth() {
                    if (!this.canCalculate) return 0;
                    // Formula: 2 × (H + W) + buffer
                    const val = (2 * (parseFloat(this.boxH) + parseFloat(this.boxW))) + parseFloat(this.buffer);
                    return Math.ceil(val * 2) / 2; // Round up to nearest 0.5
                },

                get resultLength() {
                    if (!this.canCalculate) return 0;
                    // Formula: L + 2×H + buffer
                    const val = parseFloat(this.boxL) + (2 * parseFloat(this.boxH)) + parseFloat(this.buffer);
                    return Math.ceil(val * 2) / 2; // Round up to nearest 0.5
                },

                get isRollWideEnough() {
                    return parseFloat(this.rollW) >= this.resultWidth;
                },

                async share() {
                    let text = '';
                    if (this.mode === 'quick') {
                        text = `🎁 Wrap It — bsfreetools.com/wrap\nBox: ${this.boxL}" × ${this.boxW}" × ${this.boxH}"\nCut at: ${this.resultLength}" long\nRoll width: ${this.rollW}" ${this.isRollWideEnough ? '✓' : '⚠️'}\nMeasure once, cut once. ✂️`;
                    } else {
                        text = `🎁 Wrap It — bsfreetools.com/wrap\nBox: ${this.boxL}" × ${this.boxW}" × ${this.boxH}"\nCut your paper: ${this.resultWidth}" wide × ${this.resultLength}" long\nBuffer: ${this.buffer}"\nMeasure twice, cut once. ✂️`;
                    }

                    if (navigator.share) {
                        try {
                            await navigator.share({ title: 'Wrap It Result', text: text });
                        } catch (err) {
                            this.copyFallback(text);
                        }
                    } else {
                        this.copyFallback(text);
                    }
                },

                copyFallback(text) {
                    navigator.clipboard.writeText(text);
                    alert('Result copied to clipboard!');
                }
            }
        }
    </script>
</body>
</html>
