<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PauseMyself 90</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --blue: #3b82f6; --bg: #000; --red: #ef4444; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; 
               display: flex; align-items: center; justify-content: center; height: 100dvh; margin: 0; overflow: hidden; }
        #app { text-align: center; width: 90%; max-width: 400px; position: relative; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        
        .brand-stack { margin-bottom: 2rem; line-height: 1.1; }
        .brand-stack span { display: block; text-transform: uppercase; letter-spacing: 4px; pointer-events: none;}
        .brand-p { font-size: 2.5rem; font-weight: 200; color: #fff; }
        .brand-m { font-size: 2.5rem; font-weight: 500; color: var(--blue); }
        .brand-90 { font-size: 4rem; font-weight: 900; letter-spacing: 10px; margin-top: 0.5rem; color: #fff; }

        .circle-wrap { height: 220px; display: flex; align-items: center; justify-content: center; margin: 1rem 0; }
        .circle { width: 100px; height: 100px; border: 4px solid var(--blue); border-radius: 50%; 
                   transition: transform 4s ease-in-out; box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); pointer-events: none;}
        .inhale { transform: scale(2.0); }
        
        .btn { background: var(--blue); color: #fff; border: none; padding: 1.5rem 2rem; 
               border-radius: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; 
               -webkit-appearance: none; -webkit-tap-highlight-color: transparent; position: relative; z-index: 10; }
        .secondary { background: transparent; border: 1px solid #444; }
        
        .hidden { display: none !important; }
        #msg { font-size: 1.8rem; font-weight: 300; min-height: 1.6em; margin-bottom: 0.5rem; letter-spacing: 1px; }
        
        .beta-warning { position: absolute; bottom: 30px; left: 0; right: 0; font-size: 0.65rem; color: var(--red); 
                        text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; padding: 0 20px; line-height: 1.4; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="app">
        <div id="gate">
            <div class="brand-stack">
                <span class="brand-p">Pause</span>
                <span class="brand-m">Myself</span>
                <span class="brand-90">90</span>
            </div>
            <p style="color: #888; margin-bottom: 2rem; font-size: 0.9rem;">Biological Transition Utility</p>
            <button id="startBtn" class="btn" onclick="startApp()">Begin 4-7-8 Session</button>
        </div>

        <div id="active" class="hidden">
            <p id="msg">Prepare...</p>
            <div class="circle-wrap"><div id="ball" class="circle"></div></div>
        </div>

        <div id="decision" class="hidden">
            <p style="font-size: 1.2rem; margin-bottom: 1.5rem;">Session complete.</p>
            <button class="btn" onclick="window.location.reload()">I'm Ready</button>
            <button class="btn secondary" onclick="startApp()">Repeat Session</button>
        </div>

        <div class="beta-warning">
            BETA TEST PHASE: THIS TOOL IS NOT AUTHORIZED FOR PUBLIC USE. <br>USE AT YOUR OWN RISK.
        </div>
    </div>

    <script>
        // FORCED CACHE CLEAR: Version 1.0.3
        console.log("App Version 1.0.3 Loaded");

        let isRunning = false;

        async function startApp() {
            if (isRunning) return;
            isRunning = true;
            
            console.log("Starting Session...");

            // UI Elements
            const gate = document.getElementById('gate');
            const active = document.getElementById('active');
            const decision = document.getElementById('decision');
            const msg = document.getElementById('msg');
            const ball = document.getElementById('ball');

            // Toggle UI
            gate.classList.add('hidden');
            decision.classList.add('hidden');
            active.classList.remove('hidden');

            // Initial voice handshake
            try {
                const utter = new SpeechSynthesisUtterance("Begin reset.");
                utter.rate = 0.9;
                window.speechSynthesis.speak(utter);
            } catch(e) { console.log("Voice blocked"); }
            
            // 4-7-8 Breathing Loop
            for (let i = 0; i < 4; i++) {
                // Inhale (4s)
                msg.innerText = "Inhale";
                ball.classList.add('inhale');
                await new Promise(r => setTimeout(r, 4000));
                
                // Hold (7s)
                msg.innerText = "Hold";
                await new Promise(r => setTimeout(r, 7000));
                
                // Exhale (8s)
                msg.innerText = "Exhale";
                ball.classList.remove('inhale');
                await new Promise(r => setTimeout(r, 8000));
            }

            isRunning = false;
            active.classList.add('hidden');
            decision.classList.remove('hidden');
            
            try {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance("Are you ready?"));
            } catch(e) {}
        }

        // Unregister all old service workers to prevent "zombie code"
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                } 
            });
        }
    </script>
</body>
</html>
